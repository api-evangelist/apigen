aid: apigen
url: >-
  https://raw.githubusercontent.com/api-evangelist/apigen/refs/heads/main/apis.yml
name: APIGen
description: >-
  ApiGen is an open source PHP API documentation generator that automatically
  produces smart and simple documentation from PHP source code. It supports
  PHP 7.1+ including all PHP 8.3 features like enums, union types, readonly
  classes, and intersection types. ApiGen is maintained by the ApiGen GitHub
  organization and can be installed via Docker, Phar binary, or Composer.
tags:
  - Code
  - Documentation
  - Generation
  - Open Source
  - PHP
